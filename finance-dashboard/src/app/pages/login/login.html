<div class="login-wrapper">
  <div class="login-card">
    <h2 class="login-title">Login</h2>
    <form>
      <div class="form-group">
        <label for="username">Username</label>
        <input name="username" type="text" id="username" [(ngModel)]="username" placeholder="Enter your username...">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input name="password" type="password" id="password" [(ngModel)]="password" placeholder="Enter your password...">
      </div>
      <button class="btn-login" type="submit" (click)="onLogin()">Login</button>
    </form>
  </div>
</div>
