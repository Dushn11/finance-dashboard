<div class="login-wrapper">
  @if (authService.isAuthenticated()) {
    <div class="login-card">
      <h2 class="login-title">Login</h2>
      <form>
        <div class="form-group">
          <label for="username">Username</label>
          <input name="username" type="text" id="username" [(ngModel)]="username" placeholder="Enter your username...">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input name="password" type="password" id="password" [(ngModel)]="password" placeholder="Enter your password...">
        </div>
        <button class="btn-login" type="submit" (click)="onLogin()">Login</button>
      </form>
    </div>
  }
  @if (!authService.isAuthenticated()) {
    <div class="login-card">
      <h2 class="login-title">Register</h2>
      <form>
        <div class="form-group">
          <label for="username">Username</label>
        <input name="username" type="text" id="username" [(ngModel)]="username" placeholder="Enter your username...">
      </div>
      <div class="form-group">
        <label for="email">E-Mail</label>
        <input name="email" type="email" id="email" [(ngModel)]="email" placeholder="Enter your e-mail...">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input name="password" type="password" id="password" [(ngModel)]="password" placeholder="Enter your password...">
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input name="confirmPassword" type="password" id="confirmPassword" [(ngModel)]="confirmPassword" placeholder="Confirm your password...">
      </div>
      <button class="btn-login" type="submit" (click)="onRegister()">Register</button>
    </form>
  </div>
}
</div>
