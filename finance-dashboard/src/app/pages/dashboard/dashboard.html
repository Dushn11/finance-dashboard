<div class="dashboard-container">
    <mat-tab-group *ngIf="dashboardService.tabs.length > 0">
        <mat-tab *ngFor="let tab of dashboardService.tabs; let i = index">
            <ng-template mat-tab-label>
                {{ tab.name }}
                <button class="close-tab" (click)="closeTab(i); $event.stopPropagation()">
                    ×
                </button>
            </ng-template>

            <div class="tab-content">
                <div class="toolbar">
                    <button (click)="addWidget(tab.id)">+ Add Widget</button>
                </div>
                <ng-container *ngIf="isBrowser">
                    <gridster [options]="tab.gridsterConfig">
                        <gridster-item *ngFor="let widget of tab.widgets" [item]="widget">
                            <div class="widget-container">
                                <div class="widget-header">
                                    <span>{{ widget.type }}</span>
                                    <button (click)="removeWidget(tab.id, widget.id)">×</button>
                                </div>

                                <div class="widget-content">
                                    Widget content here
                                </div>
                            </div>
                        </gridster-item>
                    </gridster>
                </ng-container>
            </div>
        </mat-tab>
    </mat-tab-group>

    <div *ngIf="dashboardService.tabs.length === 0" class="empty-state">
        <p>No dashboards yet. Import a file to create one.</p>
    </div>
</div>
